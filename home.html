<!DOCTYPE html>
<html>
<head>
  <title>Rooka Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="home.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

</head>
<body>

<!-- Header -->
<header>Rooka Official</header>

<!-- Slider -->
<div class="slider">
  <img id="slide" src="assets/slide1.jpg" alt="Slide">
</div>

<!-- Image Buttons -->
<div class="btns">
  <div class="btn-box" onclick="alert('Account Page')">
    <img src="assets/batton.png" alt="">
    <span>Account</span>
  </div>
  <div class="btn-box" onclick="document.getElementById('apply').scrollIntoView()">
    <img src="assets/batton.png" alt="">
    <span>Apply</span>
  </div>
</div>

<!-- Big Image -->
<div class="big-box">
  <img src="assets/main.jpg" alt="Main">
</div>

<!-- Grid -->
<div class="grid">
  <img src="assets/pic1.jpg" alt="Pic 1">
  <img src="assets/pic2.jpg" alt="Pic 2">
</div>

<!-- Apply Section (placeholder) -->
<div id="apply"></div>

<!-- Bottom Nav -->
<div class="nav">
  <a href="home.html">
    <img src="assets/home.png" alt="">
    <span>Home</span>
  </a>
  <a href="history.html">
    <img src="assets/massage.png" alt="">
    <span>Massage</span>
  </a>
  <a href="mine.html">
    <img src="assets/mine.png" alt="">
    <span>Mine</span>
  </a>
</div>

<!-- JS -->
<script src="home.js"></script>

</body>
</html>
