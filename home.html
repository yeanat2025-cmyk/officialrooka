<!DOCTYPE html>
<html>
<head>
  <title>Rooka Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="home.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>
<body>

<!-- Header -->
<header>Rooka Official</header>

<!-- Slider -->
<div class="slider">
  <img id="slide" alt="Slide">
</div>

<!-- Image Buttons -->
<div class="btns">
  <div class="btn-box" onclick="alert('Account Page')">
    <img src="assets/batton.png" alt="">
    <span>Account</span>
  </div>
  <div class="btn-box" onclick="document.getElementById('apply').scrollIntoView()">
    <img src="assets/batton.png" alt="">
    <span>Apply</span>
  </div>
</div>

<!-- Big Image -->
<div class="big-box">
  <img id="mainImg" alt="Main">
</div>

<!-- Grid -->
<div class="grid">
  <img id="g1" alt="Pic 1">
  <img id="g2" alt="Pic 2">
</div>

<!-- Apply Section -->
<div id="apply" class="apply-box">
  <h3>Apply Form</h3>
  <form id="applyForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <select id="position">
      <option value="Admin">Admin</option>
      <option value="Super Admin">Super Admin</option>
      <option value="Reseller">Reseller</option>
      <option value="Manager">Manager</option>
    </select>
    <button type="submit">Submit</button>
  </form>
  <p id="msg"></p>
</div>

<!-- Bottom Nav -->
<div class="nav">
  <a href="home.html">
    <img src="assets/home.png" alt="">
    <span>Home</span>
  </a>
  <a href="history.html">
    <img src="assets/massage.png" alt="">
    <span>Massage</span>
  </a>
  <a href="mine.html">
    <img src="assets/mine.png" alt="">
    <span>Mine</span>
  </a>
</div>

<!-- ✅ type="module" — firebase.js er sathe match korbe -->
<script type="module" src="home.js"></script>

</body>
</html>
