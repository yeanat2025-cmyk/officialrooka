<!DOCTYPE html>
<html>
<head>
  <title>Rooka Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background: linear-gradient(to right, #f7d774, #f2c94c);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:#fff;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .logo{
      width:90px;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:12px;
      background:#f2c94c;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }

    #errorMsg{
      color:red;
      margin-top:10px;
      font-size:14px;
    }

    /* Image section */
    .media{
      margin-top:15px;
    }

    .media img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .grid{
      display:flex;
      gap:5px;
    }

    .grid img{
      width:50%;
    }
  </style>
</head>

<body>

<div class="box">

  <img src="assets/logo.png" class="logo">
  <h2>Rooka Login</h2>

  <form id="loginForm">
    <input type="text" id="idOrEmail" placeholder="Enter Rooka ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p id="errorMsg"></p>

  <!-- Media Section -->
  <div class="media">
    <img id="mainImg">
    <img id="slide">
    <div class="grid">
      <img id="g1">
      <img id="g2">
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB_qWfwC0YcWHxjs16d6LnAxzKBZg0a0P0",
  authDomain: "titi-live1.firebaseapp.com",
  projectId: "titi-live1",
  storageBucket: "titi-live1.appspot.com",
  messagingSenderId: "184688632840",
  appId: "1:184688632840:web:85caa04f3884ca5c609dbd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 LOGIN
document.getElementById("loginForm").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const id = document.getElementById("idOrEmail").value.trim();
  const pass = document.getElementById("password").value.trim();

  const snap = await getDoc(doc(db,"users",id));

  if(!snap.exists()){
    document.getElementById("errorMsg").innerText = "User not found ❌";
    return;
  }

  const data = snap.data();

  if(data.password === pass && data.status === "active"){
    alert("Login Success ✅");
    window.location.href = "home.html";
  } else {
    document.getElementById("errorMsg").innerText = "Wrong password ❌";
  }
});

// 🔥 LOAD MEDIA
try{

  // Main image
  const mainDoc = await getDoc(doc(db,"media","mainImg"));
  document.getElementById("mainImg").src = "assets/"+mainDoc.data().url;

  // Slider
  const sliderDoc = await getDoc(doc(db,"media","slider"));
  const slides = sliderDoc.data().images;

  let i=0;
  setInterval(()=>{
    document.getElementById("slide").src = "assets/"+slides[i];
    i=(i+1)%slides.length;
  },2000);

  // Grid
  const gridDoc = await getDoc(doc(db,"media","gridImgs"));
  const grid = gridDoc.data().urls;

  document.getElementById("g1").src = "assets/"+grid[0];
  document.getElementById("g2").src = "assets/"+grid[1];

}catch(err){
  console.log("Media load error:", err);
}

</script>

</body>
</html>
