<!DOCTYPE html>
<html>
<head>
  <title>Rooka Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to right, #f7d774, #f2c94c);
      margin: 0;
    }

    .box{
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    input{
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button{
      width: 100%;
      padding: 12px;
      background: #f2c94c;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #errorMsg{
      color: red;
      margin-top: 10px;
      font-size: 14px;
      min-height: 18px;
    }

    .login{
      margin-top: 15px;
      font-size: 14px;
    }

    .login a{
      color: #000;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Rooka Register</h2>

  <form id="registerForm">
    <input type="text"     id="name"     placeholder="Full Name"  required>
    <input type="text"     id="rookaId"  placeholder="Rooka ID"   required>
    <input type="email"    id="email"    placeholder="Email"      required>
    <input type="password" id="password" placeholder="Password"   required>
    <button type="submit" id="regBtn">Register</button>
  </form>

  <p id="errorMsg"></p>

  <div class="login">
    Already have account? <a href="login.html">Login</a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCUwePizW0KHicnjm85B80lN8ke2IcldCo",
  authDomain: "rooka-fe7fc.firebaseapp.com",
  projectId: "rooka-fe7fc",
  storageBucket: "rooka-fe7fc.firebasestorage.app",
  messagingSenderId: "927530984108",
  appId: "1:927530984108:web:22060c210982d6acbfb509"
};  // ✅ closing brace add kora hoyeche

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const errMsg = document.getElementById('errorMsg');
const btn    = document.getElementById('regBtn');

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name     = document.getElementById('name').value.trim();
  const rookaId  = document.getElementById('rookaId').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  errMsg.style.color = "gray";
  errMsg.innerText   = "Checking...";
  btn.disabled       = true;
  btn.innerText      = "Please wait...";

  try {
    // Check if Rooka ID already exists
    const docRef  = doc(db, "users", rookaId);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      errMsg.style.color = "red";
      errMsg.innerText   = "Rooka ID already taken ❌";
      btn.disabled       = false;
      btn.innerText      = "Register";
      return;
    }

    // ✅ Save user to Firestore
    await setDoc(docRef, {
      name:         name,
      email:        email,
      password:     password,
      status:       "active",
      deviceStatus: "enabled",
      createdAt:    new Date().toISOString()
    });

    errMsg.style.color = "green";
    errMsg.innerText   = "Register Success ✅ Redirecting...";
    setTimeout(() => { window.location.href = "login.html"; }, 800);

  } catch (err) {
    console.error(err);
    errMsg.style.color = "red";
    errMsg.innerText   = "Error ❌ Try again";
    btn.disabled       = false;
    btn.innerText      = "Register";
  }
});

</script>

</body>
</html>
