<!DOCTYPE html>
<html>
<head>
  <title>Rooka Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f7d774;
    }

    .box{
      background:#fff;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:12px;
      background:#f2c94c;
      border:none;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
    }

    .login{
      margin-top:15px;
      font-size:14px;
    }

    .login a{
      color:#000;
      font-weight:bold;
      text-decoration:none;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Rooka Register</h2>

  <form id="registerForm">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="rookaId" placeholder="Rooka ID" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Register</button>
  </form>

  <div class="login">
    Already have account? <a href="login.html">Login</a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB_qWfwC0YcWHxjs16d6LnAxzKBZg0a0P0",
  authDomain: "titi-live1.firebaseapp.com",
  projectId: "titi-live1",
  storageBucket: "titi-live1.appspot.com",
  messagingSenderId: "184688632840",
  appId: "1:184688632840:web:85caa04f3884ca5c609dbd"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById('registerForm');

form.addEventListener('submit', async (e)=>{
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const rookaId = document.getElementById('rookaId').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();

  try{

    // 🔥 Check if user already exists
    const docRef = doc(db, "users", rookaId);
    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){
      alert("User already exists ❌");
      return;
    }

    // ✅ Save user
    await setDoc(docRef, {
      name: name,
      email: email,
      password: password,
      status: "active",
      deviceStatus: "enabled",
      timestamp: new Date().toISOString()
    });

    alert("Register Success ✅");

    // 🔥 Redirect
    window.location.replace("login.html");

  }catch(err){
    console.error(err);
    alert("Error ❌");
  }

});

</script>

</body>
</html>
