<!DOCTYPE html>
<html>
<head>
  <title>Rooka Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family: Arial;
      background: linear-gradient(to right, #f7d774, #f2c94c);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      background:#fff;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:12px;
      background:#f2c94c;
      border:none;
      border-radius:6px;
      font-size:16px;
      cursor:pointer;
      font-weight:bold;
    }
    #errorMsg{
      color:red;
      margin-top:10px;
      font-size:14px;
      min-height:18px;
    }
    .register{
      margin-top:15px;
      font-size:14px;
    }
    .register a{
      color:#000;
      font-weight:bold;
      text-decoration:none;
    }
  </style>
</head>
<body>

<div class="box">

  <h2>Rooka Login</h2>

  <form id="loginForm">
    <input type="text" id="rookaId" placeholder="Rooka ID" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit" id="loginBtn">Login</button>
  </form>

  <p id="errorMsg"></p>

  <div class="register">
    Don't have account? <a href="register.html">Register Now</a>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// ✅ rooka-fe7fc — admin panel er same project
const firebaseConfig = {
  apiKey: "AIzaSyCUwePizW0KHicnjm85B80lN8ke2IcldCo",
  authDomain: "rooka-fe7fc.firebaseapp.com",
  projectId: "rooka-fe7fc",
  storageBucket: "rooka-fe7fc.firebasestorage.app",
  messagingSenderId: "927530984108",
  appId: "1:927530984108:web:22060c210982d6acbfb509"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const errMsg = document.getElementById('errorMsg');
const btn    = document.getElementById('loginBtn');

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const rookaId  = document.getElementById('rookaId').value.trim();
  const password = document.getElementById('password').value.trim();

  errMsg.style.color = "gray";
  errMsg.innerText   = "Checking...";
  btn.disabled       = true;
  btn.innerText      = "Please wait...";

  try {
    const snap = await getDoc(doc(db, "users", rookaId));

    if (!snap.exists()) {
      errMsg.style.color = "red";
      errMsg.innerText   = "User not found ❌";
      reset();
      return;
    }

    const data = snap.data();

    if (data.status === "banned") {
      errMsg.style.color = "red";
      errMsg.innerText   = "Account banned 🚫";
      reset();
      return;
    }

    if (data.password === password && data.status === "active") {
      localStorage.setItem("rookaId",   rookaId);
      localStorage.setItem("rookaName", data.name || rookaId);
      errMsg.style.color = "green";
      errMsg.innerText   = "Login Success ✅";
      setTimeout(() => { window.location.href = "home.html"; }, 600);
    } else {
      errMsg.style.color = "red";
      errMsg.innerText   = "Wrong password ❌";
      reset();
    }

  } catch (err) {
    console.error(err);
    errMsg.style.color = "red";
    errMsg.innerText   = "Error, try again ❌";
    reset();
  }
});

function reset() {
  btn.disabled  = false;
  btn.innerText = "Login";
}

</script>

</body>
</html>
